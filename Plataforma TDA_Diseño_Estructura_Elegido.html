document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

; }\n    @keyframes parpadeo { 0%,100%{opacity:1} 50%{opacity:.35} }\n\n    .header { height:64px; display:flex; align-items:center; justify-content:space-between; background:#061523; border-bottom:1px solid var(--linea); padding:0 18px; box-shadow:var(--sombra); position:sticky; top:0; z-index:50; }\n    .header__left, .header__right { display:flex; align-items:center; gap:20px; }\n    .hamb { font-size:22px; background:transparent; color:var(--texto); border:0; display:grid; place-items:center; border-radius:7px; padding:6px; transition:color .15s, background .15s; }\n    .hamb:hover { background:rgba(255,255,255,.06); }\n    .hamb.activo { color:#8fd9ef; }\n    body.sidebar-oculta .sidebar { display:none; }\n    .marca { display:flex; align-items:center; gap:11px; min-width:232px; }\n    .marca__logo { width:44px; height:44px; color:#8fd9ef; display:grid; place-items:center; }\n    .marca__logo svg { width:40px; height:40px; }\n    .marca__texto strong { display:block; font-size:13px; letter-spacing:2px; }\n    .marca__texto span { display:block; font-size:9px; color:var(--muted); letter-spacing:1px; }\n    .marca__texto em { display:block; font-size:7px; color:#5e7388; font-style:normal; letter-spacing:.5px; margin-top:1px; }\n    .division { border-left:1px solid #53687a; padding-left:18px; }\n    .division strong { display:block; font-size:15px; letter-spacing:1.5px; }\n    .division span { display:block; font-size:12px; color:var(--muted); margin-top:2px; }\n    .volver { border:0; background:transparent; color:var(--muted); display:flex; align-items:center; gap:8px; font-size:13px; }\n    .volver:hover { color:#bcecff; }\n    .fecha { color:var(--muted); font-size:14px; white-space:nowrap; display:flex; align-items:center; gap:7px; }\n    .icon-btn { position:relative; border:0; background:transparent; color:var(--texto); font-size:20px; padding:8px; display:grid; place-items:center; }\n    .icon-btn:hover { color:#bcecff; }\n    .campana::after { content:at eturn String(t||'').replace(/[&<>'\"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;',\"'\":'&#039;','\"':'&quot;'}[m])); }\n\n    /* ---------- TOASTS ---------- */\n    function toast(msg, tipo='normal'){\n      let cont = document.getElementById('toasts');\n      if(!cont){ cont=document.createElement('div'); cont.id='toasts'; cont.className='toasts'; document.body.appendChild(cont); }\n      const t = document.createElement('div'); t.className='toast estado-'+tipo;\n      t.innerHTML = `<span class=\"punto bg-${tipo}\"><\u002Fspan><span>${escapar(msg)}<\u002Fspan>`;\n      cont.appendChild(t);\n      requestAnimationFrame(()=> t.classList.add('visible'));\n      setTimeout(()=>{ t.classList.remove('visible'); setTimeout(()=>t.remove(), 300); }, 3200);\n    }\n\n    /* ---------- BITÁCORA (persistente) ---------- */\n    const BIT_KEY = 'tda_bitacora_v2';\n    function bitacoraTodo(){ try{ return JSON.parse(localStorage.getItem(BIT_KEY)||'{}'); }catch(e){ return {}; } }\n    function bitacoraLeer(pid){ return bitacoraTodo()[pid]||[]; }\n    function bitacoraAgregar(pid, txt){\n      const all = bitacoraTodo(); if(!all[pid]) all[pid]=[];\n      all[pid].push({ txt, hora:new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}), user:'B. Espinoza' });\n      try{ localStorage.setItem(BIT_KEY, JSON.stringify(all)); }catch(e){}\n    }\n    function plano(procs=procesos, ruta=[]){ return procs.flatMap(p=>{ const a={...p, ruta:[...ruta, p.nombre+(p.sub?' · '+p.sub:'')]}; return [a, ...plano(p.hijos||[], a.ruta)]; }); }\n    function buscarProceso(id){ return plano().find(p=>p.id===id); }\n    function esSimulado(p){ return !!(escenarioActivo && escenarioActivo.afecta.includes(p.id)); }\n    function estadoSimProc(p){ return (escenarioActivo.estadosPorProc && escenarioActivo.estadosPorProc[p.id]) || escenarioActivo.estadoSimulado; }\n    function estadoVisual(p){ return esSimulado(p) ? estadoSimProc(p) : (p.estado||'normal'); }\n    function estadoMacro(m){\n      if(escenarioActivo){\n        const afect = m.procs.filter(id=>escenarioActivo.afecta.includes(id));\n        if(afect.length){\n          // estado dominante (mayor prioridad) entre los procesos afectados del macroactivo\n          let mejor=null;\n          afect.forEach(id=>{ const e=(escenarioActivo.estadosPorProc&&escenarioActivo.estadosPorProc[id])||escenarioActivo.estadoSimulado; if(mejor===null||estados[e].prioridad<estados[mejor].prioridad) mejor=e; });\n          return mejor;\n        }\n      }\n      return m.estado;\n    }\n    function padreEtapa(id){ return procesos.find(et=>(et.hijos||[]).some(h=>h.id===id)); }\n\n    function setModulo(m){\n      if(videowall && m!=='tda') salirVideowall();\n      modulo = m;\n      document.getElementById('btn-volver').classList.toggle('oculto', m==='home');\n      document.getElementById('subtitulo-header').textContent = m==='ejecutivo'?'Reporte ejecutivo':m==='admin'?'Administración dinámica':'Tomador de decisiones ágiles';\n      cerrarDetalle();\n      render();\n    }\n    function actualizarCampana(){\n      const b = document.getElementById('btn-notificaciones'); if(!b) return;\n      b.setAttribute('data-count', String(eventosActivos().length));\n    }\n    function render(){\n      actualizarCampana();\n      if(modulo==='home') return renderHome();\n      if(modulo==='ejecutivo') return renderEjecutivo();\n      if(modulo==='tda') return renderTDA();\n      if(modulo==='admin') return renderAdmin();\n    }\n\n    /* ---------- HOME ---------- */\n    function renderHome(){\n      app.innerHTML = `<section class=\"landing\"><div class=\"landing__cards\">\n        <article class=\"modulo-card verde\"><div class=\"modulo-icono\">${ICONOS.ejecutivo}<\u002Fdiv><div><h2>Reporte ejecutivo<\u002Fh2><p>Indicadores de seguridad, producción, costos, resultados financieros y dotación.<\u002Fp><\u002Fdiv><button data-go=\"ejecutivo\">Ingresar al módulo<\u002Fbutton><\u002Farticle>\n        <article class=\"modulo-card cian\"><div class=\"modulo-icono\">${ICONOS.cart}<\u002Fdiv><div><h2>Tomador de decisiones ágiles<\u002Fh2><p>Flujo lineal de la cadena productiva con propagación inteligente de eventos.<\u002Fp><\u002Fdiv><button data-go=\"tda\">Ingresar al módulo<\u002Fbutton><\u002Farticle>\n        <\u002Fdiv><div class=\"landing__titulo\"><h1>Plataforma TDA<\u002Fh1><p>Navegación de control estratégico y operativo para la División El Teniente.<\u002Fp><\u002Fdiv><\u002Fsection>`;\n    }\n\n    /* ---------- EJECUTIVO (orden según mockup) ---------- */\n    let rangoEjec = 'Hoy';\n    function renderEjecutivo(){\n      const filtros = ['Hoy','7 días','Mes','Seleccionar fecha','Proyectado día','Proyectado semana'].map(f=>`<button class=\"boton boton-sm ${f===rangoEjec?'boton-cian':''}\" data-rango=\"${f}\">${f}<\u002Fbutton>`).join('');\n      app.innerHTML = `<section class=\"app contenido\">\n        <div class=\"fila entre\">\n          <div><h1 class=\"titulo-pantalla\">Resumen ejecutivo División El Teniente<\u002Fh1>\n            <div class=\"fila\" style=\"gap:18px;margin-top:4px;font-size:13px;color:var(--muted)\"><span>💵 Dólar 980 CLP<\u002Fspan><span>🟥 Precio Cobre 6,0 c/lb<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"fila\">${filtros}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"grid-kpi\">${kpisEjec.map(k=>kpi(...k)).join('')}<\u002Fdiv>\n        <div class=\"ejecutivo-layout\">\n          <div class=\"ejec-izq\">\n            <div class=\"panel\"><h2>Indicadores de seguridad y ambientales<\u002Fh2>\n              <div class=\"mini-indicadores\">${segAmb.map(s=>`<div><strong>${s[1]}<\u002Fstrong><span class=\"mi-meta\">${s[2]} · &gt;${s[3]}%<\u002Fspan><small>${s[0]}<\u002Fsmall><\u002Fdiv>`).join('')}<\u002Fdiv><\u002Fdiv>\n            <div class=\"tablas-ejecutivas\">${tablaVar('Dotación',dotacion)}${tablaVar('Indicadores financieros',financieros)}<\u002Fdiv>\n            <div class=\"ejec-abajo\">\n              <div class=\"panel\"><h2>Bitácora de eventos operacionales<\u002Fh2>\n                <div class=\"fila entre\" style=\"font-size:11px;color:var(--muted);padding:4px 0\"><span>Descripción<\u002Fspan><span>Pérdida productiva<\u002Fspan><\u002Fdiv>\n                ${[1,2,3,4,5,6].map(()=>`<div class=\"bitacora-row\"><span>Ingrese evento relacionado<\u002Fspan><span>-100 Cuf<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv>\n              <div class=\"ejec-wf\">${waterfall('Factorial Cobre Nuevo',wfNuevo)}${waterfall('Factorial Cobre Comercial',wfComercial)}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <section class=\"panel\">\n            <div class=\"fila entre\" style=\"align-items:flex-start\"><div><h2 style=\"margin-bottom:0\">Cumplimiento por fase productiva<\u002Fh2><p style=\"color:var(--muted);margin:2px 0 0\">Real vs PAM<\u002Fp><\u002Fdiv><span style=\"font-size:11px;color:var(--muted)\">Tendencia Real vs PAM<\u002Fspan><\u002Fdiv>\n            ${fases.map(f=>faseFila(...f)).join('')}\n          <\u002Fsection>\n        <\u002Fdiv><\u002Fsection>`;\n      app.querySelectorAll('[data-rango]').forEach(b=> b.onclick = ()=>{ rangoEjec = b.dataset.rango; renderEjecutivo(); toast('Periodo: '+rangoEjec,'observado'); });\n    }\n    function kpi(t,v,u,estado,pct){ return `<div class=\"kpi ${estado}\"><small>${t}<\u002Fsmall><div class=\"kpi__valor\">${v} <span>${u}<\u002Fspan><\u002Fdiv><div class=\"kpi__meta\">Meta 000 · <span class=\"kpi__pct\">&gt;${pct}%<\u002Fspan><\u002Fdiv><\u002Fdiv>`; }\n    function tablaVar(titulo, filas){ return `<div class=\"panel\"><h3 style=\"text-align:center\">${titulo}<\u002Fh3><table><tr><th>Ítem<\u002Fth><th>Real<\u002Fth><th>PAM<\u002Fth><th>Var.<\u002Fth><\u002Ftr>${filas.map(f=>`<tr><td>${f[0]}<\u002Ftd><td>${f[1]}<\u002Ftd><td>${f[2]}<\u002Ftd><td class=\"var-${f[4]}\">${f[3]}<\u002Ftd><\u002Ftr>`).join('')}<\u002Ftable><\u002Fdiv>`; }\n    function faseFila(nombre,pct,tipo){\n      const cls = tipo==='critico'?'critico':tipo==='warn'?'warn':''; const w = tipo==='critico'?'95':'96'; const pctcls = tipo==='critico'?'crit':tipo==='warn'?'warn':'';\n      return `<div class=\"fase\"><div class=\"fase__top\"><span>${nombre}<\u002Fspan><span class=\"pct-v ${pctcls}\">${pct}%<\u002Fspan><\u002Fdiv><div class=\"fase__meta\">Meta 150.000 ton // Real 140.000 ton<\u002Fdiv><div class=\"fase__row\"><div class=\"barra ${cls}\"><span style=\"width:${w}%\"><\u002Fspan><\u002Fdiv>${sparkline(tipo)}<\u002Fdiv><\u002Fdiv>`;\n    }\n    function sparkline(tipo){ const c = tipo==='critico'?'var(--rojo)':tipo==='warn'?'var(--amarillo)':'var(--verde)'; const pts = tipo==='critico'?'0,4 12,3 24,10 36,16 48,18 60,17':'0,16 12,6 24,9 36,5 48,8 60,7'; return `<svg viewBox=\"0 0 60 20\" width=\"64\" height=\"22\" preserveAspectRatio=\"none\"><polyline points=\"${pts}\" fill=\"none\" stroke=\"${c}\" stroke-width=\"1.6\"/><\u002Fsvg>`; }\n    function waterfall(titulo, pasos){\n      const max = Math.max(...pasos.map(p=>p[1]));\n      const col = t => t==='base'||t==='final'?'var(--azul-simulacion)':t==='baja'?'var(--rojo)':'var(--verde)';\n      const barras = pasos.map(p=>{ const h=Math.round((p[1]/max)*70)+6; return `<div style=\"display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1\"><div style=\"font-size:10px;color:#cdd9e3;margin-bottom:3px\">${p[1]}<\u002Fdiv><div style=\"width:78%;height:${h}px;background:${col(p[2])};border-radius:2px\"><\u002Fdiv><div style=\"font-size:9px;color:var(--muted);margin-top:5px;text-align:center;line-height:1.1\">${p[0]}<\u002Fdiv><\u002Fdiv>`; }).join('');\n      return `<div class=\"panel\"><h3 style=\"text-align:center;font-size:14px\">${titulo}<\u002Fh3><div style=\"display:flex;gap:5px;align-items:flex-end;height:112px;padding-top:8px\">${barras}<\u002Fdiv><\u002Fdiv>`;\n    }\n\n    /* ---------- TDA ---------- */\n    function renderTDA(){\n      app.innerHTML = `<section class=\"tda-shell\">\n        ${renderSidebar()}\n        <main class=\"tda-main\">\n          <div class=\"fila entre tda-controles\"><div class=\"fila\"><button class=\"boton\" data-go=\"home\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M14 6l-6 6 6 6\"/><\u002Fsvg> Volver<\u002Fbutton><h1 class=\"titulo-pantalla\">Tomador de decisiones ágiles<\u002Fh1><\u002Fdiv>\n            <div class=\"fila\"><button class=\"boton\" id=\"btn-videowall\">${ICONOS.videowall} Modo Videowall<\u002Fbutton><button class=\"boton\" id=\"btn-3d\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M12 3l8 4.5v9L12 21l-8-4.5v-9z\"/><path d=\"M12 3v18M4 7.5l8 4.5 8-4.5\"/><\u002Fsvg> Vista 3D · beta<\u002Fbutton><button class=\"boton\" id=\"btn-reportabilidad\">Reportabilidad<\u002Fbutton><button class=\"boton\" id=\"btn-imputaciones\">Imputaciones<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <div class=\"escenarios-contactos\">\n            <section class=\"panel escenarios\"><strong>${ICONOS.lightning} ESCENARIOS DE SIMULACIÓN<\u002Fstrong>${escenarios.map(e=>`<button class=\"${escenarioActivo?.id===e.id?'activo':''}\" data-escenario=\"${e.id}\">${escapar(e.nombre)}<\u002Fbutton>`).join('')}<\u002Fsection>\n            <section class=\"panel contacto\"><span>${ICONOS.search} CONTACTOS TURNO<\u002Fspan><div class=\"contacto__txt\">Gerente de Operaciones Pablo Vera +56998765432 // Gerente Mina Matías Ferrada +56998765432<\u002Fdiv><\u002Fsection>\n          <\u002Fdiv>\n          ${escenarioActivo?bannerSimulacion():''}\n          <section class=\"estado-activos\"><h2>Estado general de activos<\u002Fh2><div class=\"mini-activos\">${macroactivos.map(m=>miniActivo(m)).join('')}<\u002Fdiv>\n            <div class=\"progreso-wrap\"><div class=\"progreso-top\"><span>CUMPLIMIENTO COBRE NUEVO<\u002Fspan><span>Real ${escenarioActivo?'612':'789'} ton · PAM 850 ton<\u002Fspan><\u002Fdiv><div class=\"progreso\"><span style=\"width:${escenarioActivo?'72':'92'}%\"><\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fsection>\n          <section class=\"tarjetas-proceso\">${procesos.map(p=>tarjetaProceso(p)).join('')}<\u002Fsection>\n          ${videowall?renderVideowallAlertas():''}\n          ${renderEventos()}\n        <\u002Fmain><\u002Fsection>`;\n      pintarArbol();\n      bindTDA();\n      actualizarCampana();\n      if(videowall) aplicarVideowall();\n    }\n    function bannerSimulacion(){\n      return `<div class=\"sim-banner\"><div class=\"sim-left\"><span class=\"sim-dot\"><\u002Fspan><div><strong>ESCENARIO EN CURSO · ${escapar(escenarioActivo.nombre)}<\u002Fstrong><small>Vista proyectada — los estados mostrados NO reflejan la condición real de los activos.<\u002Fsmall><\u002Fdiv><\u002Fdiv><button class=\"boton boton-sm\" id=\"btn-tiempo-real\">Volver a tiempo real<\u002Fbutton><\u002Fdiv>`;\n    }\n    /* Panel de alertas ampliado para muro de sala de control (videowall) */\n    function renderVideowallAlertas(){\n      const evs = eventosActivos().slice().sort((a,b)=> estados[a.severidad].prioridad - estados[b.severidad].prioridad);\n      const cont = sev => evs.filter(e=>e.severidad===sev).length;\n      const reloj = new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});\n      if(!evs.length){\n        return `<section class=\"vw-alertas vw-ok\"><div class=\"vw-al-head\"><span class=\"vw-al-titulo\"><span class=\"vw-dot\"><\u002Fspan> CENTRO DE ALERTAS<\u002Fspan><span class=\"vw-al-reloj\">${reloj}<\u002Fspan><\u002Fdiv>\n          <div class=\"vw-ok-cuerpo\"><span class=\"vw-ok-check\">✓<\u002Fspan><div><strong>OPERACIÓN NORMAL<\u002Fstrong><p>Cadena productiva completa dentro de rango · sin eventos activos<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fsection>`;\n      }\n      const principal = evs[0]; const e0 = estados[principal.severidad];\n      const secundarias = evs.slice(1);\n      return `<section class=\"vw-alertas\">\n        <div class=\"vw-al-head\"><span class=\"vw-al-titulo\"><span class=\"vw-dot\"><\u002Fspan> CENTRO DE ALERTAS<\u002Fspan>\n          <span class=\"vw-al-counts\"><span class=\"vw-count crit\">${cont('critico')} críticas<\u002Fspan><span class=\"vw-count adv\">${cont('advertencia')} advertencias<\u002Fspan><span class=\"vw-count prev\">${cont('preventivo')} preventivas<\u002Fspan><\u002Fspan>\n          <span class=\"vw-al-reloj\">${reloj}<\u002Fspan><\u002Fdiv>\n        <div class=\"vw-al-principal estado-${principal.severidad} ${principal.severidad==='critico'?'pulso-crit':''}\">\n          <div class=\"vw-al-pmain\"><span class=\"vw-al-badge bg-${principal.severidad}\">${e0.nombre.toUpperCase()}<\u002Fspan><span class=\"vw-al-proc\">${escapar(principal.proceso)}<\u002Fspan>\n            <h3>${escapar(principal.titulo)}<\u002Fh3><p class=\"vw-al-causa\">${escapar(principal.causa)}<\u002Fp><\u002Fdiv>\n          <div class=\"vw-al-pside\"><div class=\"vw-al-dato\"><small>IMPACTO<\u002Fsmall><strong>${escapar(principal.impacto)}<\u002Fstrong><\u002Fdiv><div class=\"vw-al-dato\"><small>RECOMENDACIÓN<\u002Fsmall><span>${escapar(principal.recomendacion)}<\u002Fspan><\u002Fdiv><div class=\"vw-al-dato\"><small>AGUAS ABAJO<\u002Fsmall><span>${escapar(principal.aguasAbajo)}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        ${secundarias.length?`<div class=\"vw-al-sec\">${secundarias.map(ev=>`<div class=\"vw-al-chip estado-${ev.severidad}\"><span class=\"punto bg-${ev.severidad}\"><\u002Fspan><div><strong>${escapar(ev.proceso)}<\u002Fstrong><span>${escapar(ev.titulo)}<\u002Fspan><\u002Fdiv><\u002Fdiv>`).join('')}<\u002Fdiv>`:''}\n      <\u002Fsection>`;\n    }\n    function renderSidebar(){\n      return `<aside class=\"sidebar\"><h3>${ICONOS.tree} Procesos y subprocesos<\u002Fh3>\n        <div class=\"buscador\">${ICONOS.search}<input id=\"buscador\" placeholder=\"Buscar proceso, tag, KPI, equipo...\" /><\u002Fdiv>\n        <div id=\"resultados\"><\u002Fdiv>\n        <div class=\"arbol-acciones\"><button id=\"exp-todo\">＋ Expandir todo<\u002Fbutton><button id=\"con-todo\">－ Contraer todo<\u002Fbutton><\u002Fdiv>\n        <div id=\"arbol\"><\u002Fdiv>\n        <div class=\"filtros-estados\">${Object.keys(estados).map(k=>`<button class=\"chip chip-filtro ${filtroEstado===k?'activo':''}\" data-filtro-estado=\"${k}\"><span class=\"punto bg-${k}\"><\u002Fspan>${estados[k].nombre}<\u002Fbutton>`).join('')}<\u002Fdiv>\n        ${filtroEstado?`<button class=\"boton boton-sm\" id=\"limpiar-filtro\" style=\"width:100%;margin-top:8px\">Limpiar filtro · ${estados[filtroEstado].nombre}<\u002Fbutton>`:''}\n        <button class=\"boton\" id=\"btn-glosario-s\" style=\"width:100%;margin-top:12px\">¿Qué significan los estados?<\u002Fbutton><\u002Faside>`;\n    }\n    function pintarArbol(){\n      const cont = document.getElementById('arbol'); if(!cont) return;\n      cont.innerHTML = procesos.map(p=>nodo(p,0)).join('');\n      cont.querySelectorAll('[data-toggle]').forEach(b=> b.onclick = ()=>{ const id=b.dataset.toggle; expandidos.has(id)?expandidos.delete(id):expandidos.add(id); pintarArbol(); });\n      cont.querySelectorAll('.nodo[data-proceso]').forEach(b=> b.onclick = ()=> abrirDetalle(buscarProceso(b.dataset.proceso)));\n    }\n    function nodo(p, nivel){\n      const ev = estadoVisual(p); const hijos = p.hijos||[]; const tiene = hijos.length>0; const abierto = expandidos.has(p.id);\n      const label = p.nombre + (p.sub?' · '+p.sub:'');\n      const chevron = tiene ? `<button class=\"chevron ${abierto?'abierto':''}\" data-toggle=\"${p.id}\" aria-label=\"expandir\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M9 6l6 6-6 6\"/><\u002Fsvg><\u002Fbutton>` : `<span class=\"chevron-sp\"><\u002Fspan>`;\n      let html = `<div class=\"nodo-row\">${chevron}<button class=\"nodo ${procesoSeleccionado?.id===p.id?'activo':''}\" data-proceso=\"${p.id}\" style=\"padding-left:${nivel*12}px\"><span class=\"punto bg-${ev}\"><\u002Fspan><span class=\"nombre\">${escapar(label)}<\u002Fspan>${tiene?`<span class=\"conteo-hijos\">${hijos.length}<\u002Fspan>`:''}<\u002Fbutton><\u002Fdiv>`;\n      if(tiene && abierto) html += `<div class=\"nodo-hijos\">${hijos.map(h=>nodo(h,nivel+1)).join('')}<\u002Fdiv>`;\n      return html;\n    }\n    function miniActivo(m){\n      const ev = estadoMacro(m); const e = estados[ev]; const sim = escenarioActivo && m.procs.some(id=>escenarioActivo.afecta.includes(id));\n      const atencion = videowall && ev==='critico';\n      const badge = escenarioActivo && sim ? e.nombre : m.conteo;\n      const atenuado = filtroEstado && ev!==filtroEstado ? 'atenuado' : '';\n      return `<div class=\"mini-activo estado-${ev} ${atencion?'en-atencion':''} ${atenuado}\">${atencion?'<span class=\"atencion-tag\">EN ATENCIÓN<\u002Fspan>':''}<div class=\"mini-activo__top\"><span>${escapar(m.nombre)}<\u002Fspan><span class=\"punto bg-${ev}\"><\u002Fspan><\u002Fdiv><div class=\"mini-activo__grid\">${m.metricas.map(x=>`<span>${escapar(x[0])} <b>${escapar(x[1])}<\u002Fb><\u002Fspan>`).join('')}<\u002Fdiv><span class=\"mini-activo__badge bg-${ev}\">${escapar(badge)}<\u002Fspan><\u002Fdiv>`;\n    }\n    function tarjetaProceso(p){\n      const ev = estadoVisual(p); const e = estados[ev]; const sim = esSimulado(p);\n      const bloques = (p.hijos||[]).map(b=>{ const inds=(b.indicadores||[]).map(i=>`<div class=\"tp-ind\"><span>${escapar(i)}<\u002Fspan><span>—<\u002Fspan><\u002Fdiv>`).join(''); return `<div class=\"tp-bloque\"><b>${escapar(b.nombre)}<\u002Fb>${inds}<\u002Fdiv>`; }).join('');\n      const numSub = (p.hijos||[]).length;\n      const atenuado = filtroEstado && ev!==filtroEstado ? 'atenuado' : '';\n      return `<div class=\"tarjeta-proceso estado-${ev} ${sim?'es-sim':''} ${atenuado}\" data-proceso=\"${p.id}\"><div class=\"tarjeta-proceso__top\"><div><span class=\"tarjeta-proceso__icono\">${icoStage(p.icono)}<\u002Fspan><h3>${escapar(p.nombre)}<\u002Fh3><small>${escapar(p.sub||'')}<\u002Fsmall><\u002Fdiv><span class=\"punto bg-${ev}\"><\u002Fspan><\u002Fdiv><div class=\"tp-body\">${bloques}<\u002Fdiv><div class=\"tp-footer\"><span class=\"tp-estado bg-${ev}\">${e.nombre}<\u002Fspan><span class=\"tp-sub\" data-proceso=\"${p.id}\">${numSub} subproceso${numSub===1?'':'s'} ›<\u002Fspan><\u002Fdiv><\u002Fdiv>`;\n    }\n    function renderEventos(){\n      const evs = eventosActivos();\n      const cont = sev => evs.filter(e=>e.severidad===sev).length;\n      const titulo = escenarioActivo ? 'Centro de alertas · escenario proyectado' : 'Eventos y acciones operacionales';\n      const chips = `<div class=\"fila\"><span class=\"chip\">Totales ${evs.length}<\u002Fspan><span class=\"chip\"><span class=\"punto bg-critico\"><\u002Fspan>Críticos ${cont('critico')}<\u002Fspan><span class=\"chip\"><span class=\"punto bg-advertencia\"><\u002Fspan>Advertencia ${cont('advertencia')}<\u002Fspan><span class=\"chip\"><span class=\"punto bg-preventivo\"><\u002Fspan>Preventivos ${cont('preventivo')}<\u002Fspan><\u002Fdiv>`;\n      if(!evs.length){\n        return `<section class=\"panel eventos-panel\"><div class=\"eventos-header\"><h2>${ICONOS.alerta} ${titulo}<\u002Fh2>${chips}<\u002Fdiv>\n          <div class=\"sin-eventos\"><span class=\"punto bg-normal\" style=\"width:14px;height:14px\"><\u002Fspan><div><strong>Operación normal · sin eventos activos<\u002Fstrong><p>Todos los procesos dentro de rango. Active un escenario de simulación para proyectar el impacto de una contingencia.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fsection>`;\n      }\n      return `<section class=\"panel eventos-panel\"><div class=\"eventos-header\"><h2>${ICONOS.alerta} ${titulo}<\u002Fh2>${chips}<\u002Fdiv>\n        ${evs.map(ev=>eventoCard(ev)).join('')}<\u002Fsection>`;\n    }\n    function eventoCard(ev){\n      const e = estados[ev.severidad]; const st = eventoEstado[ev.id];\n      const estadoTag = st==='resuelto' ? '<span class=\"evt-estado resuelto\">✓ Resuelto<\u002Fspan>'\n        : st==='mitigando' ? '<span class=\"evt-estado mitigando\">● Mitigando<\u002Fspan>'\n        : st==='reconocido' ? '<span class=\"evt-estado reconocido\">✓ Reconocido<\u002Fspan>' : '';\n      const eta = ev.tiempo ? `<p style=\"color:#7e93a4;font-size:11px;margin-top:6px\">Detectado hace ${escapar(ev.tiempo)}${ev.simulado?' · evento proyectado':''}<\u002Fp>` : '';\n      return `<article class=\"evento ${e.clase}\" data-evt=\"${ev.id}\"><div class=\"evento-grid\">\n        <div><span class=\"badge bg-${ev.severidad}\">${e.nombre}<\u002Fspan> ${estadoTag}<p style=\"margin-top:8px;color:var(--muted)\">${escapar(ev.proceso)}<\u002Fp><h3>${escapar(ev.titulo)}<\u002Fh3><p>Causa: ${escapar(ev.causa)}<\u002Fp><p style=\"color:#9fb6c8;font-size:12px\">${escapar(ev.aguasAbajo)}<\u002Fp>${eta}<\u002Fdiv>\n        <div><small>Impacto proyectado<\u002Fsmall><p>${escapar(ev.impacto)}<\u002Fp><\u002Fdiv>\n        <div><small>Recomendación<\u002Fsmall><p>${escapar(ev.recomendacion)}<\u002Fp><\u002Fdiv>\n        <div class=\"acciones\"><button class=\"boton boton-sm\" data-ir-evento=\"${ev.id}\">Ir al proceso<\u002Fbutton><button class=\"boton boton-sm\" data-ack=\"${ev.id}\" ${st?'disabled':''}>${st?'Reconocido':'Reconocer'}<\u002Fbutton><button class=\"boton boton-sm boton-rojo\" data-mit=\"${ev.id}\" ${st==='resuelto'?'disabled':''}>${st==='mitigando'||st==='resuelto'?'Cerrar evento':'Mitigar'}<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Farticle>`;\n    }\n    function bindTDA(){\n      document.querySelectorAll('.tarjeta-proceso[data-proceso]').forEach(b=> b.onclick = ()=> abrirDetalle(buscarProceso(b.dataset.proceso)));\n      document.querySelectorAll('[data-escenario]').forEach(b=> b.onclick = ()=>{ const e=escenarios.find(x=>x.id===b.dataset.escenario); escenarioActivo = escenarioActivo?.id===e.id?null:e; renderTDA(); });\n      document.querySelectorAll('[data-ir-evento]').forEach(b=> b.onclick = ()=>{ const ev=eventosActivos().find(x=>x.id===b.dataset.irEvento); if(ev) abrirDetalle(buscarProceso(ev.procesoId)); });\n      document.querySelectorAll('[data-ack]').forEach(b=> b.onclick = ()=>{ const ev=eventosActivos().find(x=>x.id===b.dataset.ack); if(!ev) return; eventoEstado[ev.id]='reconocido'; bitacoraAgregar(ev.procesoId, 'Evento reconocido: '+ev.titulo); toast('Evento reconocido · registrado en bitácora','normal'); renderTDA(); });\n      document.querySelectorAll('[data-mit]').forEach(b=> b.onclick = ()=>{ const ev=eventosActivos().find(x=>x.id===b.dataset.mit); if(!ev) return; if(eventoEstado[ev.id]==='mitigando'){ eventoEstado[ev.id]='resuelto'; bitacoraAgregar(ev.procesoId,'Evento cerrado tras mitigación: '+ev.titulo); toast('Evento cerrado · acción registrada','normal'); } else { eventoEstado[ev.id]='mitigando'; bitacoraAgregar(ev.procesoId,'Mitigación iniciada: '+ev.recomendacion); toast('Acción de mitigación iniciada','advertencia'); } renderTDA(); });\n      const tr = document.getElementById('btn-tiempo-real'); if(tr) tr.onclick = ()=>{ escenarioActivo=null; renderTDA(); };\n      const vw = document.getElementById('btn-videowall'); if(vw) vw.onclick = activarVideowall;\n      const b3d = document.getElementById('btn-3d'); if(b3d) b3d.onclick = ()=>{ if(window.abrirVista3D) window.abrirVista3D(); };\n      const gs = document.getElementById('btn-glosario-s'); if(gs) gs.onclick = abrirGlosario;\n      const rep = document.getElementById('btn-reportabilidad'); if(rep) rep.onclick = abrirReportabilidad;\n      const imp = document.getElementById('btn-imputaciones'); if(imp) imp.onclick = abrirImputaciones;\n      document.querySelectorAll('[data-filtro-estado]').forEach(c=> c.onclick = ()=>{ const k=c.dataset.filtroEstado; filtroEstado = filtroEstado===k?null:k; renderTDA(); });\n      const lf = document.getElementById('limpiar-filtro'); if(lf) lf.onclick = ()=>{ filtroEstado=null; renderTDA(); };\n      const et = document.getElementById('exp-todo'); if(et) et.onclick = ()=>{ plano().forEach(p=>{ if(p.hijos&&p.hijos.length) expandidos.add(p.id); }); pintarArbol(); };\n      const ct = document.getElementById('con-todo'); if(ct) ct.onclick = ()=>{ expandidos.clear(); pintarArbol(); };\n      const buscador = document.getElementById('buscador'); const resultados = document.getElementById('resultados');\n      if(buscador) buscador.oninput = ()=>{\n        const q = buscador.value.trim().toLowerCase();\n        if(!q){ resultados.innerHTML=''; return; }\n        const res = plano().filter(p=>(`${p.nombre} ${p.sub||''} ${(p.indicadores||[]).join(' ')}`).toLowerCase().includes(q)).slice(0,8);\n        resultados.innerHTML = res.length ? `<div class=\"resultados\">${res.map(r=>`<button class=\"resultado\" data-res=\"${r.id}\">${r.ruta.join(' › ')}<\u002Fbutton>`).join('')}<\u002Fdiv>` : `<div class=\"resultados\"><small>No hay resultados autorizados.<\u002Fsmall><\u002Fdiv>`;\n        resultados.querySelectorAll('[data-res]').forEach(btn=> btn.onclick = ()=>{ const id=btn.dataset.res; const et2=padreEtapa(id); if(et2) expandidos.add(et2.id); expandidos.add(id); pintarArbol(); abrirDetalle(buscarProceso(id)); });\n      };\n    }\n    function abrirDetalle(p){\n      if(!p) return;\n      procesoSeleccionado = p;\n      const ev = estadoVisual(p); const e = estados[ev]; const sim = esSimulado(p);\n      pintarArbol();\n      detalle.classList.remove('oculto');\n      const acciones = [\n        ['asignar','Asignar responsable'],['escalar','Escalar evento'],\n        ['postmortem','Crear post-mortem'],['historico','Ver histórico'],\n        ['regla','Configurar regla'],['silenciar','Silenciar 30 min']\n      ];\n      detalle.innerHTML = `<div class=\"detalle__top\"><div><small style=\"color:#8fd9ef;letter-spacing:2px\">DETALLE OPERACIONAL<\u002Fsmall><h2>${escapar(p.nombre)}${p.sub?' · '+escapar(p.sub):''}<\u002Fh2><p style=\"color:var(--muted);font-size:12px\">${(p.ruta||[p.nombre]).join(' › ')}<\u002Fp><\u002Fdiv><button class=\"cerrar\" id=\"cerrar-detalle\">×<\u002Fbutton><\u002Fdiv>\n        <div class=\"detalle-card ${e.clase}\"><small>Estado ${sim?'proyectado (simulación)':'visual'}<\u002Fsmall><div class=\"fila\" style=\"margin-top:8px\"><span class=\"punto ${e.bg}\"><\u002Fspan><strong>${e.nombre}<\u002Fstrong><\u002Fdiv>${sim?`<p style=\"font-size:12px;color:#bcd4ff\">Estado REAL del activo: ${estados[p.estado]?.nombre}. Estado mostrado por escenario <strong>${escapar(escenarioActivo.nombre)}<\u002Fstrong>.<\u002Fp>`:''}<\u002Fdiv>\n        <div class=\"detalle-card\"><h3>Indicadores asociados<\u002Fh3>${(p.indicadores||(p.hijos?p.hijos.map(h=>h.nombre):['Sin indicadores configurados'])).map((i,idx)=>`<div class=\"indicador\"><span>${escapar(i)}<\u002Fspan><span>${idx===0?e.nombre:'Normal'}<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv>\n        <div class=\"detalle-card\"><h3>Acciones disponibles<\u002Fh3><div class=\"acciones-grid\">${acciones.map(a=>`<button class=\"boton\" data-accion=\"${a[0]}\">${a[1]}<\u002Fbutton>`).join('')}<\u002Fdiv><\u002Fdiv>\n        <div class=\"detalle-card\"><h3>Bitácora rápida<\u002Fh3><textarea id=\"bitacora-texto\" placeholder=\"Registrar observación, decisión o acción correctiva...\"><\u002Ftextarea><button class=\"boton boton-cian\" id=\"guardar-bitacora\" style=\"width:100%;margin-top:10px\">Guardar acción<\u002Fbutton>\n          <div id=\"bitacora-lista\" class=\"bitacora-lista\"><\u002Fdiv><\u002Fdiv>`;\n      document.getElementById('cerrar-detalle').onclick = cerrarDetalle;\n      document.getElementById('guardar-bitacora').onclick = ()=>{\n        const ta = document.getElementById('bitacora-texto'); const v = ta.value.trim();\n        if(!v){ toast('Escribe una observación antes de guardar','advertencia'); return; }\n        bitacoraAgregar(p.id, v); ta.value=''; pintarBitacora(p.id); toast('Acción registrada en bitácora','normal');\n      };\n      detalle.querySelectorAll('[data-accion]').forEach(b=> b.onclick = ()=>{\n        const map = { asignar:'Responsable asignado al evento', escalar:'Evento escalado a nivel superior', postmortem:'Post-mortem creado para análisis posterior', historico:'Histórico consultado', regla:'Regla de estado configurada', silenciar:'Alertas silenciadas por 30 minutos' };\n        bitacoraAgregar(p.id, map[b.dataset.accion]); pintarBitacora(p.id); toast(map[b.dataset.accion],'observado');\n      });\n      pintarBitacora(p.id);\n    }\n    function pintarBitacora(pid){\n      const cont = document.getElementById('bitacora-lista'); if(!cont) return;\n      const log = bitacoraLeer(pid);\n      cont.innerHTML = log.length ? log.slice().reverse().map(x=>`<div class=\"bit-item\"><span class=\"bit-hora\">${x.hora}<\u002Fspan><span>${escapar(x.txt)}<\u002Fspan><span class=\"bit-user\">${escapar(x.user)}<\u002Fspan><\u002Fdiv>`).join('') : '<p style=\"color:#5e7388;font-size:12px;margin:8px 0 0\">Sin registros para este proceso.<\u002Fp>';\n    }\n    function cerrarDetalle(){ procesoSeleccionado=null; detalle.classList.add('oculto'); detalle.innerHTML=''; }\n\n    /* ---------- ADMIN ---------- */\n    function renderAdmin(){\n      app.innerHTML = `<section class=\"app contenido\"><h1 class=\"titulo-pantalla\">Administrador de estructura operacional<\u002Fh1>\n        <p style=\"color:var(--muted);max-width:920px\">Módulo referencial para crear procesos, asociarlos a padres, definir indicadores, permisos, reglas visuales, escenarios y el modo videowall, sin modificar código Angular.<\u002Fp>\n        <div class=\"admin-grid\">\n          ${adminCard('Crear proceso/subproceso',['Proceso padre','Nombre visible','Etapa de cadena','Ícono','Orden visual','Activo'])}\n          ${adminCard('Permisos por perfil',['Puede ver','Puede operar','Puede configurar','Puede simular','Puede cerrar eventos'])}\n          ${adminCard('Reglas visuales y glosario',['Estado resultante','Color','Prioridad','Badge','Explicación para usuario (glosario)'])}\n          ${adminCard('Indicadores',['Código / Tag','Unidad','Fuente (Databricks)','Umbral preventivo','Umbral crítico'])}\n          ${adminCard('Escenarios de simulación',['Nombre','Procesos afectados','Estado simulado','Texto del banner','Perfiles autorizados'])}\n          ${adminCard('Modo Videowall / Kiosko',['Rol kiosko sin idle-logout','Refresco automático de token','Wake lock de pantalla','Vista por defecto','Realce de activos críticos'])}\n        <\u002Fdiv><\u002Fsection>`;\n    }\n    function adminCard(t, items){ return `<article class=\"admin-card\"><h2>${t}<\u002Fh2>${items.map(i=>`<div class=\"admin-item\">${i}<\u002Fdiv>`).join('')}<\u002Farticle>`; }\n\n    /* ---------- GLOSARIO ---------- */\n    function abrirGlosario(){\n      const filas = Object.keys(estados).map(k=>{ const e=estados[k]; return `<div class=\"glos-row\"><div class=\"glos-chip\"><span class=\"glos-sw\" style=\"background:${e.color}\"><\u002Fspan>${e.nombre}<\u002Fdiv><p>${e.glos}<\u002Fp><\u002Fdiv>`; }).join('');\n      glosarioEl.innerHTML = `<div class=\"modal-backdrop\" id=\"glos-bd\"><\u002Fdiv><div class=\"modal-card\"><h2>${ICONOS.alerta} Glosario de estados<\u002Fh2><p style=\"color:var(--muted);margin-top:0\">Cada activo, proceso e indicador muestra un color que resume su condición. Esta es la lectura, de mayor a menor prioridad cuando varias condiciones coexisten:<\u002Fp>${filas}\n        <div class=\"glos-nota\"><strong>Cómo leer una simulación:<\u002Fstrong> al activar un escenario (Black Out, Sísmica, etc.) la plataforma proyecta cómo quedarían los activos. Para evitar confundirlo con la realidad, aparece un <strong>banner naranjo \"Escenario en curso\"<\u002Fstrong> en la parte superior y el detalle de cada proceso indica el estado real en paralelo. Al pulsar \"Volver a tiempo real\" se restablece la vista operativa.<\u002Fdiv>\n        <div class=\"glos-nota\"><strong>Prioridad de estados:<\u002Fstrong> Crítico &gt; Sin datos &gt; Fuente degradada &gt; Simulación &gt; Advertencia &gt; Preventivo &gt; Observado &gt; Normal. Si un activo cumple varias condiciones, se muestra la de mayor prioridad.<\u002Fdiv>\n        <button class=\"boton boton-cian\" id=\"glos-cerrar\" style=\"width:100%;margin-top:16px\">Entendido<\u002Fbutton><\u002Fdiv>`;\n      glosarioEl.classList.remove('oculto');\n      document.getElementById('glos-bd').onclick = cerrarGlosario;\n      document.getElementById('glos-cerrar').onclick = cerrarGlosario;\n    }\n    function cerrarGlosario(){ glosarioEl.classList.add('oculto'); glosarioEl.innerHTML=''; }\n\n    /* ---------- MODAL GENÉRICO (Reportabilidad / Imputaciones) ---------- */\n    function abrirModal(titulo, cuerpo, ico){\n      glosarioEl.innerHTML = `<div class=\"modal-backdrop\" id=\"modal-bd\"><\u002Fdiv><div class=\"modal-card\"><div class=\"fila entre\"><h2>${ico||ICONOS.tree} ${escapar(titulo)}<\u002Fh2><button class=\"cerrar\" id=\"modal-x\">×<\u002Fbutton><\u002Fdiv>${cuerpo}<\u002Fdiv>`;\n      glosarioEl.classList.remove('oculto');\n      document.getElementById('modal-bd').onclick = cerrarGlosario;\n      document.getElementById('modal-x').onclick = cerrarGlosario;\n      glosarioEl.querySelectorAll('[data-modal-toast]').forEach(b=> b.onclick = ()=>{ toast(b.dataset.modalToast,'observado'); cerrarGlosario(); });\n    }\n    function abrirReportabilidad(){\n      const reportes = [\n        ['Reporte de turno','Resumen de producción, eventos y acciones del turno actual.','PDF'],\n        ['Cumplimiento Cobre Nuevo','Real vs PAM por etapa y acumulado del día.','Excel'],\n        ['Eventos y mitigaciones','Bitácora de eventos, responsables y tiempos de respuesta.','PDF'],\n        ['Disponibilidad de activos','Estado y disponibilidad por macroactivo y subproceso.','Excel'],\n        ['Calidad de datos','Latencia y confiabilidad de fuentes (Databricks / Data Lake).','PDF']\n      ];\n      const cuerpo = `<p style=\"color:var(--muted);margin-top:0\">Genera y descarga reportes operacionales del periodo. En producción se construyen desde el backend .NET con datos de PostgreSQL y data products.<\u002Fp>\n        <div class=\"rep-lista\">${reportes.map(r=>`<div class=\"rep-item\"><div><strong>${r[0]}<\u002Fstrong><p>${r[1]}<\u002Fp><\u002Fdiv><button class=\"boton boton-sm boton-cian\" data-modal-toast=\"Generando ${escapar(r[0])} (${r[2]})...\">Generar ${r[2]}<\u002Fbutton><\u002Fdiv>`).join('')}<\u002Fdiv>`;\n      abrirModal('Reportabilidad', cuerpo, ICONOS.ejecutivo);\n    }\n    function abrirImputaciones(){\n      const cuerpo = `<p style=\"color:var(--muted);margin-top:0\">Registra la imputación de una pérdida productiva a un proceso y causa. Queda trazada en la bitácora del proceso.<\u002Fp>\n        <div class=\"imp-form\">\n          <label>Proceso afectado<select id=\"imp-proc\">${plano().filter(p=>p.tipo!=='etapa'||p.hijos).map(p=>`<option value=\"${p.id}\">${escapar((p.ruta||[p.nombre]).join(' › '))}<\u002Foption>`).join('')}<\u002Fselect><\u002Flabel>\n          <label>Causa<select id=\"imp-causa\"><option>Falla de equipo<\u002Foption><option>Detención programada<\u002Foption><option>Falta de alimentación<\u002Foption><option>Evento climático<\u002Foption><option>Calidad de dato<\u002Foption><option>Otra<\u002Foption><\u002Fselect><\u002Flabel>\n          <label>Pérdida (ton Cu fino)<input id=\"imp-perdida\" type=\"number\" value=\"42\" min=\"0\" /><\u002Flabel>\n          <label>Comentario<textarea id=\"imp-coment\" placeholder=\"Detalle de la imputación...\"><\u002Ftextarea><\u002Flabel>\n          <button class=\"boton boton-cian\" id=\"imp-guardar\" style=\"width:100%\">Registrar imputación<\u002Fbutton>\n        <\u002Fdiv>`;\n      abrirModal('Imputaciones de pérdida', cuerpo, ICONOS.alerta);\n      document.getElementById('imp-guardar').onclick = ()=>{\n        const pid = document.getElementById('imp-proc').value;\n        const causa = document.getElementById('imp-causa').value;\n        const perdida = document.getElementById('imp-perdida').value||'0';\n        const coment = document.getElementById('imp-coment').value.trim();\n        bitacoraAgregar(pid, `Imputación: -${perdida} ton Cu · ${causa}${coment?' · '+coment:''}`);\n        cerrarGlosario(); toast(`Imputación registrada: -${perdida} ton Cu ('screen'); } }catch(e){}\n      if(!heartbeat) heartbeat = setInterval(latido, 30000);\n      document.addEventListener('visibilitychange', reacquireWakeLock);\n      renderTDA();\n      latido();\n    }\n    function aplicarVideowall(){ const b=document.getElementById('vw-salir'); if(b) b.onclick = salirVideowall; }\n    function latido(){\n      const info = document.getElementById('vw-info');\n      const mins = inicioVW ? Math.floor((Date.now()-inicioVW)/60000) : 0;\n      if(info) info.textContent = `Wake lock: ${wakeLock?'activo':'no soportado'} · Heartbeat OK · Sesión activa ${mins} min · ${new Date().toLocaleTimeString('es-CL')}`;\n      const reloj = document.querySelector('.vw-al-reloj'); if(reloj) reloj.textContent = new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});\n      // En producción: fetch('/api/v1/tda/sesion/keepalive')\n    }\n    async function reacquireWakeLock(){ if(videowall && document.visibilityState==='visible' && 'wakeLock' in navigator){ try{ wakeLock = await navigator.wakeLock.request('screen'); }catch(e){} } }\n    function salirVideowall(){\n      videowall = false; document.body.classList.remove('videowall');\n      if(heartbeat){ clearInterval(heartbeat); heartbeat=null; }\n      document.removeEventListener('visibilitychange', reacquireWakeLock);\n      if(wakeLock){ try{ wakeLock.release(); }catch(e){} wakeLock=null; }\n      if(modulo==='tda') renderTDA();\n    }\n    document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ if(videowall) salirVideowall(); else if(!glosarioEl.classList.contains('oculto')) cerrarGlosario(); } });\n\n    /* ---------- BOOT ---------- */\n    document.getElementById('logo-marca').innerHTML = ICONOS.brain;\n    (function(){ const bm=document.getElementById('btn-menu'); if(!bm) return;\n      if(localStorage.getItem('tda-sidebar-oculta')==='1'){ document.body.classList.add('sidebar-oculta'); bm.classList.add('activo'); }\n      bm.onclick = ()=>{ const off=document.body.classList.toggle('sidebar-oculta'); bm.classList.toggle('activo', off); localStorage.setItem('tda-sidebar-oculta', off?'1':'0'); }; })();\n    document.addEventListener('click', e=>{ const go=e.target.closest('[data-go]'); if(go) setModulo(go.dataset.go); });\n    document.getElementById('btn-volver').onclick = ()=> setModulo('home');\n    document.getElementById('btn-notificaciones').onclick = toggleNotificaciones;\n    document.getElementById('btn-glosario-h').onclick = abrirGlosario;\n    render();\n  <\u002Fscript>\n\n  <!-- ============ VISTA 3D (BETA) — motor Three.js (lazy init) ============ -->\n  <script>\n  (function(){\n    let inited=false, visible=false, suaveTarget=null;\n    let renderer, scene, camera, controls, reloj;\n    const facilidades=[], flujos=[];\n    let seleccion=null, filtro=null, simOn=false;\n    const root=document.getElementById('v3d');\n\n    window.abrirVista3D=function(){\n      root.classList.remove('oculto');\n      if(!inited){ try{ init(); inited=true; }catch(e){ falla(e); return; } }\n      visible=true; onResize();\n      setTimeout(()=>{ const l=document.getElementById('v3-load'); if(l) l.classList.add('oculto'); }, 300);\n    };\n    window.cerrarVista3D=function(){ visible=false; root.classList.add('oculto'); };\n    function falla(e){\n      const l=document.getElementById('v3-load');\n      if(l) l.innerHTML='<div class=\"v3-err\"><b>No se pudo cargar el motor 3D.<\u002Fb><br>Esta vista beta requiere la librería de render (Three.js). Si abriste el archivo sin conexión, usa la versión standalone que la incluye embebida.<\u002Fdiv>';\n      console.warn('Vista 3D:', e);\n    }\n\n    document.getElementById('v3-volver').onclick=window.cerrarVista3D;\n    document.getElementById('v3-d-abrir').onclick=window.cerrarVista3D;\n    document.getElementById('v3-cerrar').onclick=()=>{ document.getElementById('v3-detalle').classList.remove('abierto'); seleccion=null; };\n    document.addEventListener('keydown', e=>{ if(e.key==='Escape' && visible){ if(document.getElementById('v3-detalle').classList.contains('abierto')){ document.getElementById('v3-detalle').classList.remove('abierto'); seleccion=null; } else window.cerrarVista3D(); } });\n\n    document.getElementById('v3-logo').innerHTML='<svg viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 10c-4 0-7 3-7 7 0 1-2 2-2 5s2 3 2 5c0 4 3 6 7 6\"/><path d=\"M29 10c4 0 7 3 7 7 0 1 2 2 2 5s-2 3-2 5c0 4-3 6-7 6\"/><path d=\"M24 8v32\"/><circle cx=\"16\" cy=\"17\" r=\"1.4\" fill=\"currentColor\"/><circle cx=\"32\" cy=\"17\" r=\"1.4\" fill=\"currentColor\"/><circle cx=\"15\" cy=\"27\" r=\"1.4\" fill=\"currentColor\"/><circle cx=\"33\" cy=\"27\" r=\"1.4\" fill=\"currentColor\"/><path d=\"M24 16l-6 1M24 22l6 2M24 28l-7 1\"/><\u002Fsvg>';\n\n    /* ---------- DATOS ---------- */\n    const ESTADOS={\n      normal:{nombre:'Normal',color:'#2e9b3a',glow:'#46d957',prioridad:8,nota:'Operación dentro de rango. No requiere intervención.'},\n      observado:{nombre:'Observado',color:'#1493b8',glow:'#3fc8ec',prioridad:7,nota:'Seguimiento menor o condición informativa.'},\n      preventivo:{nombre:'Preventivo',color:'#d8c51f',glow:'#f6e64a',prioridad:6,nota:'Tendencia negativa o riesgo temprano. Conviene revisar.'},\n      advertencia:{nombre:'Advertencia',color:'#d0781e',glow:'#ff9d3c',prioridad:5,nota:'Umbral relevante superado. Requiere atención.'},\n      critico:{nombre:'Crítico',color:'#af2632',glow:'#ff4d5e',prioridad:1,nota:'Impacto operacional real o inminente. Acción inmediata.'},\n      sinDatos:{nombre:'Sin datos',color:'#64748b',glow:'#94a3b8',prioridad:2,nota:'No existe lectura ni fuente disponible.'}\n    };\n    const ACTIVOS=[\n      {id:'mina_sub',nombre:'MINA SUBTERRÁNEA',etapa:'Extracción',estado:'normal',conteo:'10 activos · Normal',pos:[-58,-128],tipo:'mina',metricas:[['Tonelaje','1.000'],['Ley','0,84'],['LHD','92%'],['Baldes','340']]},\n      {id:'rajo',nombre:'MINA RAJO SEWELL',etapa:'Extracción',estado:'normal',conteo:'8 activos · Normal',pos:[62,-134],tipo:'rajo',metricas:[['Tonelaje','620'],['CAEX','88%'],['Ley','0,71'],['Perfor.','90%']]},\n      {id:'transp',nombre:'TRANSPORTE Y CHANCADO',etapa:'Reducción',estado:'normal',conteo:'10 activos · Normal',pos:[-6,-58],tipo:'chancado',metricas:[['Tte 8','98%'],['CV-316','86%'],['Stock','OK'],['Setting','OK']]},\n      {id:'sag',nombre:'LÍNEA SAG',etapa:'Molienda',estado:'normal',conteo:'9 activos · Normal',pos:[-78,-8],tipo:'planta',metricas:[['Ton SAG','41k'],['Rend','96%'],['Pebbles','OK'],['Alim.','OK']]},\n      {id:'conv',nombre:'LÍNEA CONVENCIONAL',etapa:'Molienda',estado:'normal',conteo:'9 activos · Normal',pos:[28,-2],tipo:'planta',metricas:[['Ton MUN','22k'],['MCONV','98%'],['Molinos','OK'],['Rend','95%']]},\n      {id:'molib',nombre:'PLANTA DE MOLIBDENO',etapa:'Flotación',estado:'normal',conteo:'7 activos · Normal',pos:[104,46],tipo:'planta',metricas:[['Rec.Mo','62%'],['Ley Mo','48%'],['Kelly1','OK'],['Flujo','OK']]},\n      {id:'agua',nombre:'RECURSOS HÍDRICOS',etapa:'Soporte',estado:'normal',conteo:'8 activos · Normal',pos:[-118,52],tipo:'agua',metricas:[['Caudal','OK'],['Torque','OK'],['Agua','94%'],['Bombas','OK']]},\n      {id:'filtro',nombre:'FILTRO Y SECADO',etapa:'Concentrado',estado:'normal',conteo:'8 activos · Normal',pos:[-26,74],tipo:'planta',metricas:[['Filtr.','OK'],['Hum.','8,1%'],['Cu','29%'],['Secado','OK']]},\n      {id:'fund',nombre:'FUNDICIÓN',etapa:'Fundición · Caletones',estado:'normal',conteo:'6 activos · Normal',pos:[46,138],tipo:'fundicion',metricas:[['Fundido','OK'],['CPS','97%'],['Moldeo','OK'],['Rend','94%']]}\n    ];\n    const FLUJO=[['mina_sub','transp'],['rajo','transp'],['transp','sag'],['transp','conv'],['sag','filtro'],['conv','filtro'],['conv','molib'],['agua','filtro'],['filtro','fund']];\n    const ESCENARIO_DEMO={transp:'advertencia',sag:'preventivo',fund:'critico',agua:'observado',conv:'preventivo'};\n    const conteosOrig={}; ACTIVOS.forEach(a=>conteosOrig[a.id]=a.conteo);\n\n    /* ---------- RUIDO + TERRENO ---------- */\n    function fract(x){return x-Math.floor(x);}\n    function hash(i,j){return fract(Math.sin(i*127.1+j*311.7)*43758.5453);}\n    function smooth(t){return t*t*(3-2*t);}\n    function vnoise(x,y){const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;const a=hash(ix,iy),b=hash(ix+1,iy),c=hash(ix,iy+1),d=hash(ix+1,iy+1);const ux=smooth(fx),uy=smooth(fy);return a*(1-ux)*(1-uy)+b*ux*(1-uy)+c*(1-ux)*uy+d*ux*uy;}\n    function fbm(x,y){let v=0,amp=0.5,freq=1;for(let i=0;i<5;i++){v+=amp*vnoise(x*freq,y*freq);freq*=2;amp*=0.5;}return v;}\n    function H(wx,wz){const n1=fbm(wx*0.0042+10,wz*0.0042+10);const n2=fbm(wx*0.018,wz*0.018);let m=(-wz+70)/270;m=Math.max(0,Math.min(1,m));m=m*m;return m*150+n1*72+n2*16-34;}\n    const SIZE=460,SEG=200;\n\n    function init(){\n      const canvas=document.getElementById('v3-canvas');\n      renderer=new THREE.WebGLRenderer({canvas,antialias:true,preserveDrawingBuffer:true});\n      renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));\n      renderer.setSize(innerWidth,innerHeight);\n      renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;\n      renderer.outputEncoding=THREE.sRGBEncoding;\n      scene=new THREE.Scene(); scene.background=new THREE.Color('#061827'); scene.fog=new THREE.Fog('#061827',360,760);\n      camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,1,2400); camera.position.set(40,215,300);\n      controls=new THREE.OrbitControls(camera,renderer.domElement);\n      controls.target.set(0,6,6); controls.enableDamping=true; controls.dampingFactor=0.07;\n      controls.minDistance=130; controls.maxDistance=560; controls.maxPolarAngle=1.46;\n      controls.autoRotate=true; controls.autoRotateSpeed=0.45;\n      controls.addEventListener('start',()=>controls.autoRotate=false);\n\n      scene.add(new THREE.HemisphereLight('#3a5d7e','#0a1622',0.85));\n      const sol=new THREE.DirectionalLight('#dfe9ff',1.15); sol.position.set(-180,230,120); sol.castShadow=true;\n      sol.shadow.mapSize.set(2048,2048); sol.shadow.camera.near=50; sol.shadow.camera.far=720;\n      sol.shadow.camera.left=-300; sol.shadow.camera.right=300; sol.shadow.camera.top=300; sol.shadow.camera.bottom=-300; sol.shadow.bias=-0.0004;\n      scene.add(sol);\n      const rell=new THREE.DirectionalLight('#2b6f9e',0.35); rell.position.set(160,90,-140); scene.add(rell);\n\n      // terreno\n      const C={valle:new THREE.Color('#102b36'),bajo:new THREE.Color('#1b3a44'),roca:new THREE.Color('#39474f'),rocaAlt:new THREE.Color('#566773'),nieve:new THREE.Color('#e6eef3')};\n      function lc(a,b,t){return a.clone().lerp(b,t);}\n      function tcol(h,j){ if(h<6)return lc(C.valle,C.bajo,Math.max(0,h+30)/36); if(h<55)return lc(C.bajo,C.roca,(h-6)/49); if(h<100)return lc(C.roca,C.rocaAlt,(h-55)/45); const s=Math.min(1,(h-100)/38)*(0.6+j*0.4); return lc(C.rocaAlt,C.nieve,s); }\n      const geo=new THREE.PlaneGeometry(SIZE,SIZE,SEG,SEG); const pos=geo.attributes.position; const cols=[];\n      for(let i=0;i<pos.count;i++){ const px=pos.getX(i),py=pos.getY(i); const h=H(px,-py); pos.setZ(i,h); const c=tcol(h,vnoise(px*0.05,-py*0.05)); cols.push(c.r,c.g,c.b); }\n      geo.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));\n      geo.rotateX(-Math.PI/2); geo.computeVertexNormals();\n      const terreno=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.96,metalness:0.02,flatShading:true}));\n      terreno.receiveShadow=true; scene.add(terreno);\n      const zoc=new THREE.Mesh(new THREE.BoxGeometry(SIZE,60,SIZE),new THREE.MeshStandardMaterial({color:'#04101a',roughness:1})); zoc.position.y=-64; scene.add(zoc);\n      (function(){ const a=ACTIVOS.find(x=>x.id==='agua'); const d=new THREE.Mesh(new THREE.CircleGeometry(34,48),new THREE.MeshStandardMaterial({color:'#0e5a73',roughness:0.18,metalness:0.6,transparent:true,opacity:0.86})); d.rotation.x=-Math.PI/2; d.position.set(a.pos[0]+30,H(a.pos[0]+30,a.pos[1]+8)+1.2,a.pos[1]+8); scene.add(d); })();\n\n      // materiales / helpers\n      const mE=new THREE.MeshStandardMaterial({color:'#7e8a95',roughness:0.62,metalness:0.45});\n      const mE2=new THREE.MeshStandardMaterial({color:'#9aa6b0',roughness:0.7,metalness:0.3});\n      const mM=new THREE.MeshStandardMaterial({color:'#aeb8c0',roughness:0.35,metalness:0.7});\n      function box(w,h,d,m){const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.castShadow=true;o.receiveShadow=true;return o;}\n      function cyl(r1,r2,h,m){const o=new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,16),m);o.castShadow=true;o.receiveShadow=true;return o;}\n      function construir(t){const g=new THREE.Group();\n        if(t==='mina'){const p=box(14,11,9,mE);p.position.y=5.5;g.add(p);const to=box(4,18,4,mM);to.position.set(-7,9,3);g.add(to);const ci=box(22,2,3,mM);ci.position.set(11,7,0);ci.rotation.z=-0.32;g.add(ci);}\n        else if(t==='rajo'){for(let i=0;i<3;i++){const te=cyl(7-i*1.6,9-i*1.6,4,mE);te.position.set(0,2+i*4,0);g.add(te);}const ex=box(5,5,8,mM);ex.position.set(8,3,2);g.add(ex);}\n        else if(t==='chancado'){const to=cyl(3,8,15,mE);to.position.y=7.5;g.add(to);const na=box(16,10,11,mE2);na.position.set(11,5,0);g.add(na);const ci=box(26,1.8,3,mM);ci.position.set(2,9,7);ci.rotation.z=0.2;g.add(ci);}\n        else if(t==='planta'){for(let i=0;i<3;i++){const s=cyl(4.4,4.4,16,i%2?mE2:mM);s.position.set(-9+i*9,8,0);g.add(s);}const na=box(14,9,12,mE);na.position.set(2,4.5,11);g.add(na);}\n        else if(t==='agua'){const t1=cyl(8,8,9,mM);t1.position.set(-6,4.5,0);g.add(t1);const t2=cyl(6,6,7,mE2);t2.position.set(8,3.5,2);g.add(t2);const ca=box(9,6,7,mE);ca.position.set(2,3,-8);g.add(ca);}\n        else if(t==='fundicion'){const ho=box(18,13,13,mE);ho.position.y=6.5;g.add(ho);const c1=cyl(2.2,3,30,mM);c1.position.set(-9,15,-4);g.add(c1);const c2=cyl(1.8,2.4,24,mM);c2.position.set(-2,12,-6);g.add(c2);const na=box(14,8,10,mE2);na.position.set(11,4,3);g.add(na);}\n        return g;}\n      function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}\n      function etiqueta(txt){const pad=22,fs=40;const cv=document.createElement('canvas');let cx=cv.getContext('2d');cx.font=`600 ${fs}px Saira, sans-serif`;const w=Math.ceil(cx.measureText(txt).width)+pad*2,h=fs+pad*1.4;cv.width=w;cv.height=h;cx=cv.getContext('2d');cx.font=`600 ${fs}px Saira, sans-serif`;cx.fillStyle='rgba(6,21,35,0.82)';rr(cx,0,0,w,h,16);cx.fill();cx.strokeStyle='rgba(90,166,207,0.5)';cx.lineWidth=2;rr(cx,1,1,w-2,h-2,15);cx.stroke();cx.fillStyle='#eaf3fb';cx.textBaseline='middle';cx.textAlign='center';cx.fillText(txt,w/2,h/2+2);const tex=new THREE.CanvasTexture(cv);tex.anisotropy=4;const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,depthTest:false,transparent:true}));sp.scale.set(w*0.13,h*0.13,1);sp.renderOrder=10;return sp;}\n\n      ACTIVOS.forEach(a=>{\n        const [x,z]=a.pos,y=H(x,z); const g=new THREE.Group(); g.position.set(x,y,z);\n        const pad=cyl(20,22,3,new THREE.MeshStandardMaterial({color:'#243743',roughness:0.85,metalness:0.2})); pad.position.y=1; pad.receiveShadow=true; g.add(pad);\n        const ed=construir(a.tipo); ed.position.y=2.5; g.add(ed);\n        const an=new THREE.Mesh(new THREE.TorusGeometry(19,1.3,10,60),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.95})); an.rotation.x=-Math.PI/2; an.position.y=2.6; g.add(an);\n        const fa=new THREE.Mesh(new THREE.CylinderGeometry(2.2,6.5,80,18,1,true),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.16,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending})); fa.position.y=42; g.add(fa);\n        const ba=new THREE.Mesh(new THREE.SphereGeometry(2.6,16,16),new THREE.MeshBasicMaterial({color:0xffffff})); ba.position.y=26; g.add(ba);\n        const se=new THREE.Mesh(new THREE.TorusGeometry(24,0.7,8,64),new THREE.MeshBasicMaterial({color:0x9fe0ff,transparent:true,opacity:0})); se.rotation.x=-Math.PI/2; se.position.y=2.4; g.add(se);\n        const lab=etiqueta(a.nombre); lab.position.set(0,40,0); g.add(lab);\n        const hit=new THREE.Mesh(new THREE.CylinderGeometry(22,22,50,12),new THREE.MeshBasicMaterial({visible:false})); hit.position.y=24; hit.userData.fid=a.id; g.add(hit);\n        scene.add(g);\n        facilidades.push({data:a,grupo:g,anillo:an,faro:fa,baliza:ba,sel:se,lab,hit,estado:a.estado,dim:false,hover:false});\n      });\n\n      function nodo(id){return facilidades.find(f=>f.data.id===id);}\n      FLUJO.forEach(([fr,to])=>{ const A=nodo(fr),B=nodo(to); if(!A||!B)return; const pa=A.grupo.position,pb=B.grupo.position;\n        const mid=new THREE.Vector3((pa.x+pb.x)/2,0,(pa.z+pb.z)/2); mid.y=Math.max(pa.y,pb.y)+26+pa.distanceTo(pb)*0.06;\n        const cv=new THREE.CatmullRomCurve3([new THREE.Vector3(pa.x,pa.y+22,pa.z),mid,new THREE.Vector3(pb.x,pb.y+22,pb.z)]);\n        const tu=new THREE.Mesh(new THREE.TubeGeometry(cv,40,0.7,8,false),new THREE.MeshBasicMaterial({color:0x1f7fa8,transparent:true,opacity:0.55})); scene.add(tu);\n        const parts=[]; for(let i=0;i<3;i++){ const p=new THREE.Mesh(new THREE.SphereGeometry(1.5,10,10),new THREE.MeshBasicMaterial({color:0x8fe6ff,transparent:true,opacity:0.95,blending:THREE.AdditiveBlending,depthWrite:false})); scene.add(p); parts.push(p);} flujos.push({curva:cv,parts,off:Math.random()}); });\n\n      // interacción\n      const ray=new THREE.Raycaster(),mouse=new THREE.Vector2(); const hits=facilidades.map(f=>f.hit);\n      function pick(ev){const r=canvas.getBoundingClientRect();mouse.x=((ev.clientX-r.left)/r.width)*2-1;mouse.y=-((ev.clientY-r.top)/r.height)*2+1;ray.setFromCamera(mouse,camera);const h=ray.intersectObjects(hits,false)[0];return h?h.object.userData.fid:null;}\n      canvas.addEventListener('pointermove',ev=>{const fid=pick(ev);let al=false;facilidades.forEach(f=>{f.hover=(f.data.id===fid&&!f.dim);if(f.hover)al=true;});canvas.style.cursor=al?'pointer':'default';});\n      canvas.addEventListener('click',ev=>{const fid=pick(ev);if(fid){const f=facilidades.find(x=>x.data.id===fid);if(f&&!f.dim)seleccionar(f);}});\n\n      renderChips();\n      reloj=new THREE.Clock();\n      animar();\n    }\n\n    function seleccionar(f){ seleccion=f; const a=f.data,e=ESTADOS[f.estado];\n      document.getElementById('v3-d-badge').textContent=e.nombre.toUpperCase();\n      document.getElementById('v3-d-badge').style.background=e.color;\n      document.getElementById('v3-d-etapa').textContent=a.etapa;\n      document.getElementById('v3-d-nombre').textContent=a.nombre;\n      document.getElementById('v3-d-conteo').textContent=a.conteo;\n      document.getElementById('v3-d-nota').textContent=e.nota;\n      document.getElementById('v3-d-kpis').innerHTML=a.metricas.map(m=>`<div class=\"v3-kpi\"><small>${m[0]}<\u002Fsmall><b>${m[1]}<\u002Fb><\u002Fdiv>`).join('');\n      document.getElementById('v3-detalle').classList.add('abierto');\n      controls.autoRotate=false; suaveTarget=new THREE.Vector3(f.grupo.position.x,f.grupo.position.y+10,f.grupo.position.z);\n    }\n    function estadosPresentes(){const m={};facilidades.forEach(f=>{m[f.estado]=(m[f.estado]||0)+1;});return Object.keys(ESTADOS).filter(k=>m[k]).map(k=>({k,n:m[k]}));}\n    function renderChips(){ const cont=document.getElementById('v3-chips'); const items=estadosPresentes().sort((a,b)=>ESTADOS[a.k].prioridad-ESTADOS[b.k].prioridad);\n      cont.innerHTML=items.map(it=>{const e=ESTADOS[it.k];return `<button class=\"v3-chip ${filtro===it.k?'activo':''}\" data-f=\"${it.k}\"><span class=\"pt\" style=\"background:${e.glow};color:${e.glow}\"><\u002Fspan>${e.nombre}<span class=\"n\">${it.n}<\u002Fspan><\u002Fbutton>`;}).join('')+(filtro?`<button class=\"v3-chip todos\" data-f=\"\">Mostrar todos<\u002Fbutton>`:'');\n      cont.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{filtro=b.dataset.f||null;aplicarFiltro();renderChips();}); }\n    function aplicarFiltro(){ facilidades.forEach(f=>{f.dim=filtro?(f.estado!==filtro):false;}); if(seleccion&&seleccion.dim){document.getElementById('v3-detalle').classList.remove('abierto');seleccion=null;} }\n\n    document.getElementById('v3-sim').onclick=function(){ simOn=!simOn;\n      facilidades.forEach(f=>{const d=ESCENARIO_DEMO[f.data.id];f.estado=simOn?(d||'normal'):'normal';f.data.conteo=(simOn&&d)?'⚠ '+ESTADOS[d].nombre+' · evento simulado':conteosOrig[f.data.id];});\n      this.classList.toggle('on',simOn);\n      this.innerHTML=simOn?'<svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M6 6l12 12M6 18L18 6\"/><\u002Fsvg> Volver a tiempo real':'<svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M13 2L4 14h7l-1 8 9-12h-7z\"/><\u002Fsvg> Simular evento operacional';\n      filtro=null; aplicarFiltro(); renderChips(); if(seleccion)seleccionar(seleccion);\n    };\n\n    function animar(){ requestAnimationFrame(animar); if(!visible)return; const t=reloj.getElapsedTime();\n      facilidades.forEach(f=>{ const e=ESTADOS[f.estado],col=new THREE.Color(e.glow),sev=e.prioridad; const vel=1.2+(8-sev)*0.55,amp=0.18+(8-sev)*0.07; let p=0.62+Math.sin(t*vel)*amp; if(f.hover)p=Math.min(1.1,p+0.25); const fac=f.dim?0.12:1;\n        f.anillo.material.color.copy(col); f.anillo.material.opacity=(0.35+p*0.6)*fac; f.anillo.scale.setScalar(1+(p-0.6)*0.05);\n        f.faro.material.color.copy(col); f.faro.material.opacity=(0.06+p*0.16)*fac;\n        f.baliza.material.color.copy(col); f.baliza.material.opacity=f.dim?0.15:1; f.lab.material.opacity=f.dim?0.18:1;\n        const tg=(seleccion===f)?0.9:0; f.sel.material.opacity+=(tg-f.sel.material.opacity)*0.15; f.sel.material.color.copy(col); f.sel.scale.setScalar(1+Math.sin(t*3)*0.02);\n      });\n      flujos.forEach(fl=>{ fl.parts.forEach((p,i)=>{ let u=(t*0.12+fl.off+i/fl.parts.length)%1; p.position.copy(fl.curva.getPoint(u)); p.material.opacity=0.5+Math.sin(u*Math.PI)*0.5; }); });\n      if(suaveTarget){ controls.target.lerp(suaveTarget,0.06); if(controls.target.distanceTo(suaveTarget)<0.6)suaveTarget=null; }\n      controls.update(); renderer.render(scene,camera);\n    }\n    function onResize(){ if(!renderer)return; camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); }\n    window.addEventListener('resize',onResize);\n  })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
